version: 2

project_name: tui-worktree

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy

builds:
  - id: tui-worktree
    main: ./cmd/tui-worktree
    binary: tui-worktree
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid= -X github.com/overthinker1127/tui-worktree/internal/app.BuildVersion={{ .Version }}

  - id: tui-worktree-windows
    main: ./cmd/tui-worktree
    binary: tui-worktree
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid= -X github.com/overthinker1127/tui-worktree/internal/app.BuildVersion={{ .Version }}

archives:
  - id: tui-worktree
    ids:
      - tui-worktree
      - tui-worktree-windows
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md
      - third_party/README.md
      - third_party/licenses/**/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: linux-packages
    ids:
      - tui-worktree
    package_name: tui-worktree
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: overthinker1127
    homepage: https://github.com/overthinker1127/tui-worktree
    maintainer: overthinker1127 <overthinker1127@naver.com>
    description: |-
      Terminal UI for reviewing and managing Git worktrees.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/tui-worktree/LICENSE
      - src: third_party/README.md
        dst: /usr/share/licenses/tui-worktree/third_party/README.md
      - src: third_party/licenses
        dst: /usr/share/licenses/tui-worktree/third_party/licenses
        type: tree

release:
  github:
    owner: overthinker1127
    name: tui-worktree
  prerelease: auto
